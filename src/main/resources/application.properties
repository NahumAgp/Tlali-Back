spring.application.name=tlali-back

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tlali}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

tlali.security.jwt.secret=${TLALI_JWT_SECRET:change-this-secret-in-production-at-least-32-chars}
tlali.security.jwt.expires-in-minutes=${TLALI_JWT_EXPIRES_IN_MINUTES:720}
tlali.security.frontend-auth-callback=${TLALI_FRONTEND_AUTH_CALLBACK:http://localhost:5173/auth/callback}
tlali.security.superadmin.email=${TLALI_SUPERADMIN_EMAIL:superadmin@tlali.local}
tlali.security.superadmin.password=${TLALI_SUPERADMIN_PASSWORD:SuperAdmin123!}
tlali.security.superadmin.name=${TLALI_SUPERADMIN_NAME:Super Admin}
