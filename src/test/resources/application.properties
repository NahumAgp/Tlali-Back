spring.application.name=tlali-back-test

spring.datasource.url=jdbc:h2:mem:tlali;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

tlali.security.jwt.secret=test-secret-for-tlali-jwt-at-least-32-chars
tlali.security.jwt.expires-in-minutes=60
tlali.security.frontend-auth-callback=http://localhost:5173/auth/callback
tlali.security.superadmin.email=superadmin@tlali.local
tlali.security.superadmin.password=SuperAdmin123!
tlali.security.superadmin.name=Super Admin
tlali.security.device-api-key=tlali-local-device-key
